<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Station Météo du Collège</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #0a1628;
      --mid:    #0d2347;
      --card:   #112a54;
      --accent: #38bdf8;
      --gold:   #fbbf24;
      --text:   #e0f2fe;
      --muted:  #7db4cc;
      --radius: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Ciel animé en arrière-plan */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(56,189,248,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(251,191,36,.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }

    /* En-tête */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header .label {
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      line-height: 1.1;
    }
    .update-time {
      margin-top: 10px;
      font-size: .82rem;
      color: var(--muted);
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.7); }
    }

    /* Carte principale température */
    .main-card {
      background: linear-gradient(135deg, var(--mid) 0%, var(--card) 100%);
      border: 1px solid rgba(56,189,248,.18);
      border-radius: var(--radius);
      padding: 36px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
      animation: fadeUp .5s ease both;
    }
    .temp-block .value {
      font-family: 'Syne', sans-serif;
      font-size: clamp(4rem, 12vw, 6.5rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .temp-block .feels {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .weather-icon {
      font-size: clamp(3.5rem, 10vw, 5.5rem);
      filter: drop-shadow(0 4px 16px rgba(56,189,248,.3));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* Grille de mesures */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(56,189,248,.12);
      border-radius: var(--radius);
      padding: 20px 18px;
      animation: fadeUp .5s ease both;
    }
    .card:nth-child(2) { animation-delay:.07s }
    .card:nth-child(3) { animation-delay:.14s }
    .card:nth-child(4) { animation-delay:.21s }
    .card:nth-child(5) { animation-delay:.28s }
    .card:nth-child(6) { animation-delay:.35s }

    .card .icon  { font-size: 1.5rem; margin-bottom: 10px; }
    .card .name  { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .card .val   { font-family: 'Syne', sans-serif; font-size: 1.55rem; font-weight: 700; color: #fff; }
    .card .unit  { font-size: .78rem; color: var(--muted); margin-left: 3px; }

    /* Barre de vent */
    .wind-bar {
      margin-top: 8px;
      height: 4px;
      background: rgba(56,189,248,.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .wind-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius: 99px;
      transition: width 1s ease;
    }

    /* Pied de page */
    footer {
      text-align: center;
      font-size: .72rem;
      color: rgba(125,180,204,.4);
      margin-top: 28px;
    }

    /* Erreur */
    .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .error .icon { font-size: 3rem; margin-bottom: 16px; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="label">Collège — Station météo</div>
    <h1>Météo en direct</h1>
    <div class="update-time" id="updateTime">Chargement…</div>
  </header>

  <div id="content">
    <div class="error"><div class="icon">⏳</div><p>Récupération des données…</p></div>
  </div>

  <footer>Données fournies par Weatherlink · Actualisé toutes les 15 min</footer>
</div>

<script>
// ─── Utilitaires ────────────────────────────────────────────
function val(sensors, ...keys) {
  for (const s of sensors) {
    if (!s?.data) continue;
    for (const d of s.data) {
      for (const k of keys) {
        if (d[k] !== undefined && d[k] !== null) return d[k];
      }
    }
  }
  return null;
}
function deg2dir(d) {
  if (d === null) return '—';
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(d / 45) % 8];
}
function weatherIcon(temp, hum, rain) {
  if (rain > 0)  return '🌧️';
  if (hum > 85)  return '🌫️';
  if (temp < 3)  return '🌨️';
  if (temp < 10) return '🌥️';
  if (temp < 20) return '⛅';
  return '☀️';
}
function fmt(v, dec=1) {
  return (v === null || v === undefined) ? '—' : Number(v).toFixed(dec);
}
// Conversion °F → °C si besoin
function toC(v) {
  if (v === null) return null;
  return v > 50 ? +((v - 32) * 5/9).toFixed(1) : +v.toFixed(1);
}

// ─── Rendu ──────────────────────────────────────────────────
function render(data) {
  const sensors = data?.sensors ?? [];
  const t = document.getElementById('updateTime');
  t.innerHTML = `<span class="dot"></span>Dernière mise à jour : ${data._fetched_at ?? '—'}`;

  const tempRaw  = val(sensors, 'temp', 'temp_avg');
  const temp     = toC(tempRaw);
  const hum      = val(sensors, 'hum', 'hum_avg') ?? null;
  const wind     = val(sensors, 'wind_speed_last', 'wind_speed_avg_last_2_min') ?? null;
  const windDir  = val(sensors, 'wind_dir_last', 'wind_dir_scalar_avg_last_2_min') ?? null;
  const windGust = val(sensors, 'wind_speed_hi_last_10_min') ?? null;
  const press    = val(sensors, 'bar_sea_level', 'bar_absolute') ?? null;
  const rain24   = val(sensors, 'rainfall_last_24_hr_mm', 'rainfall_day_mm') ?? 0;
  const uv       = val(sensors, 'uv_index') ?? null;
  const solar    = val(sensors, 'solar_rad') ?? null;

  // km/h depuis m/s si >30 (heuristique Weatherlink = m/s)
  const windKmh = wind !== null ? (wind < 30 ? +(wind * 3.6).toFixed(1) : +wind.toFixed(1)) : null;
  const gustKmh = windGust !== null ? (windGust < 30 ? +(windGust * 3.6).toFixed(1) : +windGust.toFixed(1)) : null;

  const icon = weatherIcon(temp, hum, rain24);
  const windPct = windKmh ? Math.min(100, (windKmh / 120) * 100) : 0;

  document.getElementById('content').innerHTML = `
    <div class="main-card">
      <div class="temp-block">
        <div class="value">${temp !== null ? fmt(temp,1) + '°C' : '—'}</div>
        <div class="feels">Humidité ${hum !== null ? fmt(hum,0)+'%' : '—'}</div>
      </div>
      <div class="weather-icon">${icon}</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="icon">💨</div>
        <div class="name">Vent</div>
        <div class="val">${windKmh !== null ? fmt(windKmh,1) : '—'}<span class="unit">km/h</span></div>
        <div class="wind-bar"><div class="wind-bar-fill" style="width:${windPct}%"></div></div>
        ${windDir !== null ? `<div style="margin-top:6px;font-size:.8rem;color:var(--muted)">${deg2dir(windDir)} (${fmt(windDir,0)}°)</div>` : ''}
      </div>

      <div class="card">
        <div class="icon">💨</div>
        <div class="name">Rafales max (10 min)</div>
        <div class="val">${gustKmh !== null ? fmt(gustKmh,1) : '—'}<span class="unit">km/h</span></div>
      </div>

      <div class="card">
        <div class="icon">🌡️</div>
        <div class="name">Pression</div>
        <div class="val">${press !== null ? fmt(press,0) : '—'}<span class="unit">hPa</span></div>
      </div>

      <div class="card">
        <div class="icon">🌧️</div>
        <div class="name">Pluie (24h)</div>
        <div class="val">${fmt(rain24,1)}<span class="unit">mm</span></div>
      </div>

      ${uv !== null ? `
      <div class="card">
        <div class="icon">☀️</div>
        <div class="name">Indice UV</div>
        <div class="val">${fmt(uv,1)}</div>
      </div>` : ''}

      ${solar !== null ? `
      <div class="card">
        <div class="icon">🔆</div>
        <div class="name">Rayonnement</div>
        <div class="val">${fmt(solar,0)}<span class="unit">W/m²</span></div>
      </div>` : ''}
    </div>
  `;
}

// ─── Chargement ─────────────────────────────────────────────
fetch('./data.json?t=' + Date.now())
  .then(r => r.json())
  .then(render)
  .catch(() => {
    document.getElementById('content').innerHTML = `
      <div class="error">
        <div class="icon">⚠️</div>
        <p>Données non disponibles.<br>Le fichier <code>data.json</code> n'existe pas encore.<br>
        Lancez le workflow GitHub Actions une première fois.</p>
      </div>`;
    document.getElementById('updateTime').textContent = '';
  });
</script>
</body>
</html>
