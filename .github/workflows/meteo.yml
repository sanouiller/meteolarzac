name: "🌤️ Mise à jour météo"

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch:          # bouton manuel dans l'onglet Actions
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  fetch:
    name: Récupérer les données Weatherlink
    runs-on: ubuntu-latest
    permissions:
      contents: write          # nécessaire pour pousser data.json

    steps:
      - name: "📥 Cloner le dépôt"
        uses: actions/checkout@v4

      - name: "🐍 Configurer Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "🌡️ Récupérer les données météo"
        env:
          WEATHERLINK_API_KEY:    ${{ secrets.WEATHERLINK_API_KEY }}
          WEATHERLINK_API_SECRET: ${{ secrets.WEATHERLINK_API_SECRET }}
          WEATHERLINK_STATION_ID: ${{ secrets.WEATHERLINK_STATION_ID }}
        run: python fetch_weather.py

      - name: "💾 Enregistrer data.json dans le dépôt"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "Pas de nouvelles données." \
            || git commit -m "🌤️ Météo $(date +'%d/%m/%Y %H:%M')" && git push
